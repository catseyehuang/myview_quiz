<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 MyView Online Quiz 🌟</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti for celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* Cute rounded fonts */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f1f8f5; /* Sage Light Background */
            background-image: radial-gradient(#d1e7dd 2px, transparent 2px); /* Sage Dots */
            background-size: 30px 30px;
        }

        /* 自訂可愛捲軸 (Sage Style) */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f8f5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #a3b899; /* Sage Tone */
            border-radius: 10px;
            border: 2px solid #f1f8f5;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7a9c73;
        }

        .btn-cute { transition: all 0.1s; }
        .btn-cute:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 0 transparent !important;
        }
        .btn-cute:disabled {
            background-color: #9ca3af !important;
            box-shadow: 0 6px 0 0 #4b5563 !important;
            cursor: not-allowed;
            transform: none;
        }

        /* MCQ Options Effect (Sage Style) */
        .option-label {
            transition: all 0.2s;
        }
        .option-input:checked + .option-label {
            background-color: #d1e7dd; /* Sage Selected Background */
            border-color: #5c8a6b; /* Sage Selected Border */
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(92, 138, 107, 0.3);
        }

        /* Fill-in-the-blank Input Effect */
        .fill-input {
            border-bottom-width: 4px;
            transition: all 0.2s;
        }
        .fill-input:focus {
            outline: none;
            border-color: #5c8a6b;
            box-shadow: 0 10px 15px -3px rgba(92, 138, 107, 0.2);
            transform: translateY(-2px);
        }

        .hidden-section { display: none; }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* 彈出視窗動畫 */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-animate { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 閃卡切換滑動動畫 */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .flashcard-animate { animation: slideInRight 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 隱藏欄位：用來接收從後端傳來的 Unit (如有需要保留) -->
    <input type="hidden" id="currentUnitVal" value="">

    <!-- Main Container -->
    <div class="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border-8 border-white outline outline-8 outline-[#d1e7dd] p-4 md:p-10 relative">

        <!-- ================= 1. Name Selection Section ================= -->
        <div id="name-section" class="text-center space-y-4 md:space-y-6">
            <h1 class="text-3xl md:text-6xl font-black text-[#5c8a6b] tracking-wide drop-shadow-sm mb-4 md:mb-6">MyView Online Quiz</h1>
            <div class="flex justify-center mb-2">
                <span class="bg-[#e8f0e5] text-[#4a6b53] text-lg md:text-2xl font-black px-4 md:px-6 py-2 rounded-full border-4 border-[#c5d8c1] shadow-sm">
                    Class: 2-Sage 🦉
                </span>
            </div>
            <div class="bg-[#f3f7f2] p-4 md:p-6 rounded-3xl border-4 border-[#dce6d8] shadow-inner w-full">
                <label class="block text-xl md:text-2xl font-bold text-[#4a6b53] text-left pl-2 mb-4">1️⃣ Pick your name:</label>
                
                <!-- 優化手機版名字按鈕：縮小字級與間距，讓名字完整呈現 -->
                <div id="names-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 md:gap-3 max-h-[400px] overflow-y-auto pr-2 pb-2">
                    <!-- Names generated dynamically via JS -->
                </div>
            </div>
            </div>

        <!-- ================= 1.5 Unit Selection Section ================= -->
        <div id="unit-section" class="hidden-section text-center space-y-4 md:space-y-6">
            <div class="flex justify-between items-center mb-4">
                <button onclick="goBackToNames()" class="text-[#5c8a6b] hover:text-[#3d5c47] font-bold text-base md:text-xl bg-[#f3f7f2] hover:bg-[#e8f0e5] px-3 md:px-4 py-2 rounded-2xl transition-colors">
                    ⬅️ Back
                </button>
                <div class="text-base md:text-xl font-bold text-gray-500 bg-gray-100 px-3 md:px-4 py-2 rounded-2xl border-2 border-gray-200 truncate max-w-[150px] md:max-w-none">
                    👤 <span id="display-name-unit">Student</span>
                </div>
            </div>

            <div class="bg-[#f3f7f2] p-4 md:p-6 rounded-3xl border-4 border-[#dce6d8] shadow-inner w-full">
                <label class="block text-xl md:text-2xl font-bold text-[#4a6b53] text-left pl-2 mb-4">2️⃣ Select a Unit to start:</label>
                
                <div id="units-container" class="flex flex-col gap-3 md:gap-4 max-h-[400px] overflow-y-auto pr-2 pb-2">
                    <!-- Loading 狀態 -->
                    <div class="col-span-full py-6 text-center text-xl font-bold text-gray-500 animate-pulse">
                        Loading units from database... ⏳
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 2. Quiz Section (Flashcard Mode) ================= -->
        <div id="quiz-section" class="hidden-section">
            <div class="flex justify-between items-center mb-4 md:mb-6 border-b-4 border-[#e8f0e5] pb-4">
                <!-- 縮小標題字級以適應長檔名 -->
                <h2 id="quiz-title" class="text-xl md:text-3xl font-black text-[#5c8a6b] truncate mr-2">Unit X</h2>
                <div class="text-sm md:text-xl font-bold text-gray-500 bg-gray-100 px-3 md:px-4 py-2 rounded-2xl border-2 border-gray-200 truncate">
                    👤 <span id="display-name-quiz">Student</span>
                </div>
            </div>

            <!-- 單題顯示的容器 -->
            <div id="questions-container" class="mb-8 flashcard-animate">
                <!-- Question card generated dynamically -->
            </div>

            <!-- 閃卡底部控制按鈕區 -->
            <div class="flex flex-row gap-3 mt-4">
                <button id="prevBtn" onclick="prevQuestion()" class="btn-cute bg-gray-200 hover:bg-gray-300 text-gray-700 shadow-[0_4px_0_0_#d1d5db] rounded-2xl px-4 md:px-6 py-4 text-lg md:text-2xl font-black hidden transition-all">
                    ⬅️ Back
                </button>
                <button id="nextBtn" onclick="nextQuestion()" class="btn-cute flex-grow bg-[#7a9c73] hover:bg-[#6b8c64] text-white shadow-[0_6px_0_0_#4a6b53] rounded-2xl px-6 py-4 text-xl md:text-2xl font-black transition-all">
                    Next ➡️
                </button>
                <button id="submitBtn" onclick="submitQuiz()" class="btn-cute flex-grow bg-[#d98b8b] hover:bg-[#c77a7a] text-white shadow-[0_6px_0_0_#a66060] rounded-2xl px-6 py-4 text-xl md:text-2xl font-black transition-all hidden">
                    🙌 I'm done! Submit
            </button>
            </div>
        </div>

        <!-- ================= 3. Result & Leaderboard Section ================= -->
        <div id="result-section" class="hidden-section text-center">
            <div id="feedback-emoji" class="text-6xl md:text-7xl mb-4">🏆</div>
            <h1 id="feedback-msg" class="text-3xl md:text-5xl font-black text-[#5c8a6b] mb-6">Great Job!</h1>
            
            <div class="bg-[#f3f7f2] rounded-[30px] p-6 md:p-8 border-4 border-[#dce6d8] mb-8 inline-block w-full max-w-md">
                <p class="text-xl md:text-2xl text-[#4a6b53] font-bold mb-2">Your Score</p>
                <p id="final-score" class="text-6xl md:text-8xl font-black text-[#d97777] drop-shadow-md">0</p>
                <p id="correct-count" class="text-lg md:text-xl text-[#5c8a6b] font-bold mt-4 bg-white rounded-full py-2 shadow-sm border-2 border-[#e8f0e5]"></p>
            </div>

            <div class="flex flex-col gap-6 md:gap-8 text-left w-full">
                <div class="bg-white rounded-3xl p-4 md:p-6 border-4 border-[#dce6d8] shadow-md w-full">
                    <h3 class="text-xl md:text-2xl font-black text-[#4a6b53] mb-4 border-b-2 border-[#e8f0e5] pb-2">📝 Review</h3>
                    <div id="review-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 md:pr-4 text-lg md:text-xl font-bold">
                    </div>
                </div>

                <div class="bg-[#f8faf7] rounded-3xl p-4 md:p-6 border-4 border-[#e8f0e5] shadow-md flex flex-col w-full">
                    <h3 class="text-xl md:text-2xl font-black text-[#5c8a6b] mb-4 border-b-2 border-[#dce6d8] pb-2">👑 Leaderboard</h3>
                    <ul id="leaderboard" class="space-y-3 text-lg md:text-xl font-bold text-gray-700 max-h-[500px] overflow-y-auto pr-2 md:pr-4">
                    </ul>
                </div>
            </div>

            <!-- 回到單元選擇 -->
            <button id="retry-btn" onclick="resetToUnitSelection()" 
                class="btn-cute mt-8 md:mt-10 bg-[#7a9c73] hover:bg-[#6b8c64] text-white shadow-[0_6px_0_0_#4a6b53] rounded-full px-8 md:px-10 py-4 text-xl md:text-2xl font-black inline-block">
                🔄 Back to Menu
            </button>
        </div>

    </div>

    <!-- ================= 客製化可愛彈出視窗 Modal ================= -->
    <div id="custom-modal" class="fixed inset-0 bg-[#2d4233]/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-6 md:p-8 max-w-sm w-full text-center shadow-2xl border-4 border-[#c5d8c1] modal-animate">
            <div id="modal-icon" class="text-5xl md:text-6xl mb-4">🐻</div>
            <h3 id="modal-title" class="text-2xl md:text-3xl font-black text-[#5c8a6b] mb-3">Oops!</h3>
            <p id="modal-message" class="text-lg md:text-xl text-gray-600 mb-8 font-bold leading-relaxed">Message here</p>
            <button onclick="closeModal()" class="btn-cute bg-[#7a9c73] hover:bg-[#6b8c64] text-white rounded-full px-8 py-3 text-xl md:text-2xl font-black w-full shadow-[0_6px_0_0_#4a6b53]">
                OK!
            </button>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // 學生名單陣列
        const studentNamesList = [
            "00-Tr. Adam", "01-Ryan", "02-Ernest", "03-Jamie", "04-Owen", 
            "05-Max", "06-Leo", "07-Kaka", "08-Chandler", "09-Ashton", 
            "10-Nick", "11-Dustin", "12-Ian", "13-Jim", "14-Murphy", 
            "15-Chance", "16-Jamie", "17-Kimi", "18-Jim", "19-Yi You", 
            "20-Rylen", "21-Elva", "22-Abbie", "23-Elly", "24-Remi", 
            "25-Allison", "26-Queenie", "27-Chiao", "28-Sammi", "29-Elena", 
            "30-Jean", "31-Tammy", "32-Victoria", "33-Eeffie", "34-Melody", 
            "35-Naomi", "36-Miley", "37-Angel", "38-Minnie"
        ];

        let currentUnit = "";
        let currentStudentName = "";
        let questionsData = [];
        let studentAnswersArray = []; // 儲存閃卡模式下的作答
        let currentQuestionIndex = 0; // 追蹤目前題號
        let modalCallback = null;

        // === 初始化：網頁載入時渲染姓名與取得單元 ===
        window.onload = function() {
            renderNameButtons();
            
            // 呼叫 GAS 取得單元
            if(typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler(renderUnits)
                    .withFailureHandler(function(err) {
                        const container = document.getElementById('units-container');
                        container.innerHTML = `<div class="col-span-full py-6 text-center text-xl font-bold text-red-500">❌ Failed to load units.<br><span class="text-sm text-gray-500">${err.message}</span></div>`;
                    })
                    .getAvailableUnits();
            } else {
                // 用於本地測試預覽 (模擬資料)
                setTimeout(() => {
                    // 模擬支援新版 {id, title} 格式
                    renderUnits([
                        {id: 'U2.2.2', title: 'The Solar System and Beyond'}, 
                        {id: 'U2.2.1', title: 'Animals in the Wild'}, 
                        'U2.1.3' // 相容舊字串格式
                    ]);
                }, 1000);
            }
        };

        // === 渲染姓名按鈕 ===
        function renderNameButtons() {
            const container = document.getElementById('names-container');
            container.innerHTML = "";
            
            studentNamesList.forEach(name => {
                const btn = document.createElement('button');
                // 針對手機縮小 padding 確保一排塞得下字
                btn.className = "btn-cute bg-white hover:bg-[#e8f0e5] text-[#4a6b53] border-2 border-[#dce6d8] shadow-[0_4px_0_0_#c5d8c1] rounded-xl px-1 sm:px-2 py-2 sm:py-3 text-sm sm:text-base md:text-lg font-black transition-all truncate";
                btn.innerText = name;
                btn.title = name; // 滑鼠懸停可以看全名
                btn.onclick = () => selectName(name);
                container.appendChild(btn);
            });
        }

        // === 選擇姓名，進入選擇單元頁面 ===
        function selectName(name) {
            currentStudentName = name;
            
            // 更新畫面上顯示的名字
            document.getElementById('display-name-unit').innerText = currentStudentName;
            document.getElementById('display-name-quiz').innerText = currentStudentName;

            // 切換區塊顯示
            document.getElementById('name-section').style.display = 'none';
            document.getElementById('unit-section').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // === 回到姓名選擇頁面 ===
        function goBackToNames() {
            document.getElementById('unit-section').style.display = 'none';
            document.getElementById('name-section').style.display = 'block';
        }

        // === 新增：回到單元選擇畫面，保留姓名 ===
        function resetToUnitSelection() {
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('unit-section').style.display = 'block';
            currentUnit = "";
            currentQuestionIndex = 0;
            studentAnswersArray = [];
            questionsData = [];
            window.scrollTo(0, 0);
        }

        function renderUnits(units) {
            const container = document.getElementById('units-container');
            container.innerHTML = "";

            if (!units || units.length === 0) {
                container.innerHTML = `<div class="col-span-full py-6 text-center text-xl font-bold text-[#d97777]">📭 No quizzes available yet.</div>`;
                return;
            }

            units.forEach(unit => {
                // 支援新的 Object 格式或舊的 String 格式
                let unitId = typeof unit === 'object' ? unit.id : unit;
                let unitTitle = typeof unit === 'object' ? unit.title : "";
                let displayText = unitTitle ? `${unitId} - ${unitTitle}` : unitId;

                const btn = document.createElement('button');
                btn.className = "btn-cute w-full text-left whitespace-normal bg-white border-4 border-[#a3b899] hover:bg-[#f1f8f5] text-gray-800 shadow-[0_6px_0_0_#a3b899] rounded-2xl px-4 md:px-6 py-3 md:py-4 text-lg md:text-2xl font-black transition-all";
                btn.innerText = displayText;
                btn.onclick = () => startQuiz(unitId, btn); // 注意這裡傳遞 unitId
                container.appendChild(btn);
            });
        }

        // === 客製化彈出視窗控制 ===
        function showModal(msg, icon = '🐻', title = 'Oops!', callback = null) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('custom-modal').classList.remove('hidden');
            modalCallback = callback;
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
            if (modalCallback) {
                modalCallback();
                modalCallback = null;
            }
        }

        // === 1. Start Quiz ===
        function startQuiz(unitName, clickedBtn) {
            currentUnit = unitName;
            document.getElementById('quiz-title').innerText = currentUnit; // 縮短標題節省空間

            // 改變按鈕狀態顯示載入中
            const originalText = clickedBtn.innerText;
            clickedBtn.innerText = "Loading... ⏳";
            clickedBtn.disabled = true;

            // 呼叫 GAS 後端取得題目
            if(typeof google !== 'undefined' && google.script) {
            google.script.run
                    .withSuccessHandler((data) => {
                        clickedBtn.innerText = originalText;
                        clickedBtn.disabled = false;
                        renderQuiz(data);
                    })
                .withFailureHandler(function(err) {
                    showModal('Error: ' + err.message, '🔧', 'System Error');
                        clickedBtn.innerText = originalText;
                        clickedBtn.disabled = false;
                })
              .getQuestions(currentUnit);
            } else {
                // 本地預覽測試用
                setTimeout(() => {
                    clickedBtn.innerText = originalText;
                    clickedBtn.disabled = false;
                    renderQuiz([
                        {type: "MCQ", question: "This is Q1. Which option is correct?", options: ["Option A (Very Long Text Check)", "Option B", "Option C", "Option D"]},
                        {type: "Fill", question: "Type 'apple' in the blank."}
                    ]);
                }, 800);
            }
        }

        // === 2. Render Questions (FreshCard)===
        function renderQuiz(data) {
            if (!data || data.length === 0) {
                showModal(
                    `We couldn't find questions for "${currentUnit}".`, 
                    '🔍', 
                    'No Questions Found',
                    () => { resetToUnitSelection(); }
                );
                return;
            }

            questionsData = data;
            // 初始化答案陣列長度與題目相同
            studentAnswersArray = new Array(data.length).fill("");
            currentQuestionIndex = 0;

            document.getElementById('unit-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            
            showFlashcard(currentQuestionIndex);
        }

        function showFlashcard(index) {
            const container = document.getElementById('questions-container');
            const q = questionsData[index];
                const qNum = index + 1;
            const totalQs = questionsData.length;

            // 重新觸發動畫效果
            container.classList.remove('flashcard-animate');
            void container.offsetWidth; // 觸發重繪
            container.classList.add('flashcard-animate');

                let qHTML = `
            <div class="bg-[#f3f7f2] rounded-3xl p-5 md:p-8 border-4 border-[#dce6d8] shadow-sm relative overflow-hidden min-h-[250px] flex flex-col justify-center">
                <div class="absolute top-0 left-0 bg-[#7a9c73] text-white font-black text-sm md:text-lg px-4 py-2 rounded-br-2xl shadow-sm">
                    Q${qNum} / ${totalQs}
                </div>
                <p class="text-xl md:text-3xl font-bold text-[#2d4233] mt-8 mb-6 leading-relaxed text-center">${q.question}</p>
                `;

                if (q.type === 'MCQ') {
                qHTML += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 w-full">`;
                    q.options.forEach((opt, optIndex) => {
                        const optId = `q${index}_opt${optIndex}`;
                    const isChecked = studentAnswersArray[index] === opt ? "checked" : "";
                        qHTML += `
                    <div class="relative w-full">
                        <input type="radio" name="ans_${index}" id="${optId}" value="${opt}" class="option-input peer sr-only" ${isChecked}>
                        <!-- 確保選項文字完整顯示，不使用 truncate -->
                        <label for="${optId}" class="option-label flex items-center justify-center w-full min-h-[60px] text-lg md:text-2xl font-bold text-gray-700 bg-white border-4 border-[#e8f0e5] rounded-2xl p-3 cursor-pointer hover:bg-[#f3f7f2] text-center leading-tight">
                                ${opt}
                            </label>
                        </div>`;
                    });
                    qHTML += `</div>`;
                } else if (q.type === 'Fill') {
                const currentVal = studentAnswersArray[index] || "";
                    qHTML += `
                    <div class="mt-4 text-center">
                    <input type="text" id="ans_${index}" value="${currentVal}" placeholder="Type here..." autocomplete="off"
                        class="fill-input w-full sm:w-2/3 text-xl md:text-3xl font-bold px-4 py-3 md:py-4 bg-white border-2 border-transparent border-b-[#c5d8c1] text-center text-[#5c8a6b] focus:border-b-[#5c8a6b] rounded-t-xl transition-all">
                    </div>`;
                }

                qHTML += `</div>`;
            container.innerHTML = qHTML;

            // 更新按鈕顯示狀態
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (index === 0) {
                prevBtn.classList.add('hidden');
            } else {
                prevBtn.classList.remove('hidden');
            }

            if (index === questionsData.length - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }

            window.scrollTo(0, 0);
        }

        // 儲存當前題目的答案
        function saveCurrentAnswer() {
            const q = questionsData[currentQuestionIndex];
                let ans = "";
                if (q.type === 'MCQ') {
                const selected = document.querySelector(`input[name="ans_${currentQuestionIndex}"]:checked`);
                    if (selected) ans = selected.value;
                } else if (q.type === 'Fill') {
                const inputEl = document.getElementById(`ans_${currentQuestionIndex}`);
                if (inputEl) ans = inputEl.value.trim();
                }
            studentAnswersArray[currentQuestionIndex] = ans;
        }

        function nextQuestion() {
            saveCurrentAnswer();
            if (!studentAnswersArray[currentQuestionIndex]) {
                showModal("Please answer this question first!", "🦊", "Wait!");
                return;
            }
            if (currentQuestionIndex < questionsData.length - 1) {
                currentQuestionIndex++;
                showFlashcard(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            saveCurrentAnswer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showFlashcard(currentQuestionIndex);
            }
        }

        function submitQuiz() {
            saveCurrentAnswer();

            // 檢查是否每一題都有作答
            const isAllAnswered = studentAnswersArray.every(ans => ans.trim() !== "");
            if (!isAllAnswered) {
                showModal("You haven't answered questions! Please check again.", "🦊", "Wait!");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Grading... 📝";
            submitBtn.disabled = true;

            const payload = {
                name: currentStudentName,
                unit: currentUnit,
                answers: studentAnswersArray
            };

            // 呼叫 GAS 後端傳送答案並批改
            if(typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(showResults)
                .withFailureHandler(function(err) {
                    showModal('Error: ' + err.message, '🔧', 'System Error');
                    submitBtn.innerText = "🙌 I'm done! Submit";
                    submitBtn.disabled = false;
                })
              .submitAnswers(payload);
            } else {
                 // 本地測試模擬成績
                setTimeout(() => {
                    showResults({
                        score: 85,
                        details: [
                            {question: "This is a local test question 1.", correct: true, studentAns: "A", correctAns: "A"},
                            {question: "Type 'apple' in the blank.", correct: false, studentAns: "Wrong", correctAns: "apple"}
                        ],
                        leaderboard: [{name: currentStudentName, score: 85}, {name: "01-Ryan", score: 80}]
                    });
                }, 1000);
            }
        }

        // === 4. Show Results & Leaderboard ===
        function showResults(resultData) {
            // Switch view
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            window.scrollTo(0, 0);

            // 恢復 Submit 按鈕狀態以防重玩
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "🙌 I'm done! Submit";
            submitBtn.disabled = false;

            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.6 },
                colors: ['#a3b899', '#7a9c73', '#e8f0e5', '#dce6d8'] // Sage confetti
            });

            // Score Animation
            animateScore(resultData.score);

            // 1. & 2. 設定評語與正確題數
            const totalQs = resultData.details.length;
            const correctQs = resultData.details.filter(d => d.correct).length;
            document.getElementById('correct-count').innerText = `✅ Correct: ${correctQs} / ${totalQs}`;

            const feedbackMsg = document.getElementById('feedback-msg');
            const feedbackEmoji = document.getElementById('feedback-emoji');
            const retryBtn = document.getElementById('retry-btn');
            
            if (resultData.score === 100) {
                feedbackMsg.innerText = "Perfect! Amazing! 🎉";
                feedbackEmoji.innerText = "🌟🏆🌟";
                retryBtn.innerText = "🔄 Play Again";
            } else if (resultData.score >= 80) {
                feedbackMsg.innerText = "Great Job! 👏";
                feedbackEmoji.innerText = "🏆";
                retryBtn.innerText = "🔄 Try Again";
            } else if (resultData.score >= 60) {
                feedbackMsg.innerText = "Good Effort! 👍";
                feedbackEmoji.innerText = "✨";
                retryBtn.innerText = "🔄 Try Again";
            } else {
                feedbackMsg.innerText = "Keep Trying! 💪";
                feedbackEmoji.innerText = "🦊";
                feedbackMsg.classList.replace('text-[#5c8a6b]', 'text-[#d97777]'); 
                retryBtn.innerText = "🔄 Try Again";
            }

            // Review Container
            const reviewContainer = document.getElementById('review-container');
            reviewContainer.innerHTML = "";
            
            // 先加上題號，再依照正確與否排序 (false 放前面)
            const sortedDetails = resultData.details
                .map((item, idx) => ({ ...item, qNum: idx + 1 }))
                .sort((a, b) => (a.correct === b.correct) ? 0 : a.correct ? 1 : -1);

            sortedDetails.forEach((item) => {
                const isCorrect = item.correct;
                const icon = isCorrect ? "✅" : "❌";
                const colorClass = isCorrect ? "text-[#5c8a6b]" : "text-[#d97777]";
                const bgHighlight = isCorrect ? "" : "bg-[#fbe8e8] border-[#eec2c2] border-2 -mx-2 px-2 rounded-xl"; 
                
                let reviewHTML = `
                <div class="mb-3 border-b border-[#e8f0e5] pb-2 ${bgHighlight}">
                    <p class="text-gray-800 text-base md:text-lg">Q${item.qNum}: ${item.question}</p>
                    <p class="${colorClass} text-lg md:text-xl mt-1">
                        ${icon} Your Answer: <span class="font-black">${item.studentAns || '(No answer)'}</span>
                    </p>`;
                
                if (!isCorrect) {
                    reviewHTML += `<p class="text-[#d9a05b] text-base md:text-lg mt-1">💡 Try again to find the answer!</p>`;
                }
                
                reviewHTML += `</div>`;
                reviewContainer.innerHTML += reviewHTML;
            });

            // 4. 顯示排行榜
            const lbContainer = document.getElementById('leaderboard');
            lbContainer.innerHTML = "";
            resultData.leaderboard.forEach((user, idx) => {
                let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "✨";
                // Highlight current user
                let bgClass = user.name === currentStudentName ? "bg-[#e8f0e5] border-2 border-[#c5d8c1] rounded-xl px-2 -mx-2" : "";
                
                lbContainer.innerHTML += `
                <li class="flex justify-between items-center ${bgClass} py-1 px-2 md:px-4">
                    <span class="truncate pr-2">${medal} ${user.name}</span>
                    <span class="font-black text-xl md:text-2xl text-[#4a6b53]">${user.score}</span>
                </li>`;
            });
        }

        // Score Counter Animation
        function animateScore(targetScore) {
            let current = 0;
            const scoreElement = document.getElementById('final-score');
            const interval = setInterval(() => {
                current += 2;
                if (current >= targetScore) {
                    current = targetScore;
                    clearInterval(interval);
                }
                scoreElement.innerText = current;
            }, 20);
        }
    </script>
</body>
</html>
