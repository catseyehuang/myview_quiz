<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 MyView Online Quiz 🌟</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Confetti for celebration effect -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* Cute rounded fonts */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #eff6ff; /* blue-50 */
            background-image: radial-gradient(#bfdbfe 2px, transparent 2px); /* blue-200 */
            background-size: 30px 30px;
        }

        /* 自訂可愛捲軸 (Blue Style) */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #eff6ff;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #93c5fd; /* blue-300 */
            border-radius: 10px;
            border: 2px solid #eff6ff;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6; /* blue-500 */
        }

        .btn-cute { transition: all 0.1s; }
        .btn-cute:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 0 transparent !important;
        }
        .btn-cute:disabled {
            background-color: #9ca3af !important;
            box-shadow: 0 6px 0 0 #4b5563 !important;
            cursor: not-allowed;
            transform: none;
        }

        /* MCQ Options Effect (Blue Style) */
        .option-label {
            transition: all 0.2s;
        }
        .option-input:checked + .option-label {
            background-color: #dbeafe; /* blue-100 */
            border-color: #3b82f6; /* blue-500 */
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        /* Fill-in-the-blank Input Effect */
        .fill-input {
            border-bottom-width: 4px;
            transition: all 0.2s;
        }
        .fill-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
            transform: translateY(-2px);
        }

        .hidden-section { display: none; }
        
        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* 彈出視窗動畫 */
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-animate { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 閃卡切換滑動動畫 */
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .flashcard-animate { animation: slideInRight 0.3s ease-out forwards; }
    </style>
</head>
<!-- 改為 flex-col 確保 Header, Main Container, Footer 垂直排列 -->
<body class="min-h-screen flex flex-col items-center justify-center p-4 md:p-8 relative">

    <!-- 隱藏欄位：用來接收從後端傳來的 Unit (如有需要保留) -->
    <input type="hidden" id="currentUnitVal" value="">

    <!-- ================= 0. Outer Header ================= -->
    <div id="outer-header" class="hidden w-full max-w-4xl flex justify-center mb-3">
        <span class="text-blue-500/80 font-black text-lg md:text-2xl tracking-wider drop-shadow-sm flex items-center gap-2">
            🌟 MyView Online Quiz for 2-Sage 🌟
        </span>
    </div>

    <!-- ================= Main Container ================= -->
    <div class="max-w-4xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border-8 border-white outline outline-8 outline-blue-200 p-4 md:p-10 relative">

        <!-- ================= 1. Name Selection Section ================= -->
        <div id="name-section" class="text-center space-y-4 md:space-y-6">
            <h1 class="text-3xl md:text-6xl font-black text-blue-600 tracking-wide drop-shadow-sm mb-4 md:mb-6">MyView Online Quiz</h1>
            <div class="flex justify-center mb-2">
                <span class="bg-indigo-100 text-indigo-800 text-lg md:text-2xl font-black px-4 md:px-6 py-2 rounded-full border-4 border-indigo-200 shadow-sm">
                    Class: 2-Sage 🦉
                </span>
            </div>
            <div class="bg-blue-50 p-4 md:p-6 rounded-3xl border-4 border-blue-100 shadow-inner w-full">
                <label class="block text-xl md:text-2xl font-bold text-blue-800 text-left pl-2 mb-4">1️⃣ Pick your name:</label>
                
                <!-- 優化手機版名字按鈕：縮小字級與間距，讓名字完整呈現 -->
                <div id="names-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2 md:gap-3 max-h-[400px] overflow-y-auto pr-2 pb-2">
                    <!-- Names generated dynamically via JS -->
                </div>
            </div>
            </div>

        <!-- ================= 1.5 Unit Selection Section ================= -->
        <div id="unit-section" class="hidden-section text-center space-y-4 md:space-y-6">
            <div class="flex justify-between items-center mb-4">
                <button onclick="goBackToNames()" class="text-blue-500 hover:text-blue-700 font-bold text-base md:text-xl bg-blue-50 hover:bg-blue-100 px-3 md:px-4 py-2 rounded-2xl transition-colors">
                    ⬅️ Back
                </button>
                <div class="text-base md:text-xl font-bold text-gray-500 bg-gray-100 px-3 md:px-4 py-2 rounded-2xl border-2 border-gray-200 truncate max-w-[150px] md:max-w-none">
                    👤 <span id="display-name-unit">Student</span>
                </div>
            </div>

            <div class="bg-cyan-50 p-4 md:p-6 rounded-3xl border-4 border-cyan-100 shadow-inner w-full">
                <label class="block text-xl md:text-2xl font-bold text-cyan-800 text-left pl-2 mb-4">2️⃣ Select a Unit to start:</label>
                
                <div id="units-container" class="flex flex-col gap-3 md:gap-4 max-h-[400px] overflow-y-auto pr-2 pb-2">
                    <!-- Loading 狀態 -->
                    <div class="col-span-full py-6 text-center text-xl font-bold text-gray-500 animate-pulse">
                        Loading units from database... ⏳
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= 2. Quiz Section (Flashcard Mode) ================= -->
        <div id="quiz-section" class="hidden-section">
            <div class="flex justify-between items-center mb-4 md:mb-6 border-b-4 border-blue-100 pb-4">
                <!-- 左側：標題 -->
                <h2 id="quiz-title" class="text-xl md:text-3xl font-black text-blue-600 truncate mr-2">Unit X</h2>
                
                <!-- 右側：學生姓名 -->
                <div class="text-sm md:text-xl font-bold text-gray-500 bg-gray-100 px-3 md:px-4 py-2 rounded-2xl border-2 border-gray-200 truncate max-w-[120px] md:max-w-[200px]">
                    👤 <span id="display-name-quiz">Student</span>
                </div>
            </div>

            <!-- 單題顯示的容器 -->
            <div id="questions-container" class="mb-8 flashcard-animate">
                <!-- Question card generated dynamically -->
            </div>

            <!-- 閃卡底部控制按鈕區 -->
            <div class="flex flex-row gap-3 mt-4">
                <button id="prevBtn" onclick="prevQuestion()" class="btn-cute bg-gray-200 hover:bg-gray-300 text-gray-700 shadow-[0_4px_0_0_#d1d5db] rounded-2xl px-4 md:px-6 py-4 text-lg md:text-2xl font-black hidden transition-all">
                    ⬅️ Back
                </button>
                <button id="nextBtn" onclick="nextQuestion()" class="btn-cute flex-grow bg-blue-500 hover:bg-blue-600 text-white shadow-[0_6px_0_0_#1d4ed8] rounded-2xl px-6 py-4 text-xl md:text-2xl font-black transition-all">
                    Next ➡️
                </button>
                <!-- 凸顯的 Submit 按鈕 (玫瑰粉色) -->
                <button id="submitBtn" onclick="submitQuiz()" class="btn-cute flex-grow bg-rose-400 hover:bg-rose-500 text-white shadow-[0_6px_0_0_#e11d48] rounded-2xl px-6 py-4 text-xl md:text-2xl font-black transition-all hidden">
                    🙌 I'm done! Submit
            </button>
            </div>
        </div>

        <!-- ================= 3. Result & Leaderboard Section ================= -->
        <div id="result-section" class="hidden-section text-center">
            <div id="feedback-emoji" class="text-6xl md:text-7xl mb-4">🏆</div>
            <h1 id="feedback-msg" class="text-3xl md:text-5xl font-black text-blue-600 mb-6">Great Job!</h1>
            
            <div class="bg-blue-50 rounded-[30px] p-6 md:p-8 border-4 border-blue-200 mb-8 inline-block w-full max-w-md">
                <p class="text-xl md:text-2xl text-blue-800 font-bold mb-2">Your Score</p>
                <p id="final-score" class="text-6xl md:text-8xl font-black text-red-500 drop-shadow-md">0</p>
                <p id="correct-count" class="text-lg md:text-xl text-blue-700 font-bold mt-4 bg-white rounded-full py-2 shadow-sm border-2 border-blue-100"></p>
            </div>

            <div class="flex flex-col gap-6 md:gap-8 text-left w-full">
                <div class="bg-white rounded-3xl p-4 md:p-6 border-4 border-blue-100 shadow-md w-full">
                    <h3 class="text-xl md:text-2xl font-black text-blue-800 mb-4 border-b-2 border-blue-100 pb-2">📝 Review</h3>
                    <div id="review-container" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 md:pr-4 text-lg md:text-xl font-bold">
                    </div>
                </div>

                <div class="bg-indigo-50 rounded-3xl p-4 md:p-6 border-4 border-indigo-100 shadow-md flex flex-col w-full">
                    <h3 class="text-xl md:text-2xl font-black text-indigo-800 mb-4 border-b-2 border-indigo-200 pb-2">👑 Leaderboard</h3>
                    <ul id="leaderboard" class="space-y-3 text-lg md:text-xl font-bold text-gray-700 max-h-[500px] overflow-y-auto pr-2 md:pr-4">
                    </ul>
                </div>
            </div>

            <!-- 回到單元選擇 -->
            <button id="retry-btn" onclick="resetToUnitSelection()" 
                class="btn-cute mt-8 md:mt-10 bg-indigo-400 hover:bg-indigo-500 text-white shadow-[0_6px_0_0_#4338ca] rounded-full px-8 md:px-10 py-4 text-xl md:text-2xl font-black inline-block">
                🔄 Back to Menu
            </button>
        </div>

    </div>

    <!-- ================= Outer Footer ================= -->
    <footer class="mt-8 text-center text-blue-400/80 font-bold text-xs md:text-sm w-full max-w-4xl tracking-wide">
        <p>&copy; 2026 MyView Online Quiz for Class 2-Sage.</p>
    </footer>

    <!-- ================= 客製化可愛彈出視窗 Modal (一般提示) ================= -->
    <div id="custom-modal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-6 md:p-8 max-w-sm w-full text-center shadow-2xl border-4 border-blue-200 modal-animate">
            <div id="modal-icon" class="text-5xl md:text-6xl mb-4">🐻</div>
            <h3 id="modal-title" class="text-2xl md:text-3xl font-black text-blue-600 mb-3">Oops!</h3>
            <p id="modal-message" class="text-lg md:text-xl text-gray-600 mb-8 font-bold leading-relaxed">Message here</p>
            <button onclick="closeModal()" class="btn-cute bg-blue-500 hover:bg-blue-600 text-white rounded-full px-8 py-3 text-xl md:text-2xl font-black w-full shadow-[0_6px_0_0_#1d4ed8]">
                OK!
            </button>
        </div>
    </div>

    <!-- ================= 客製化彈出視窗 Modal (雙按鈕確認用) ================= -->
    <div id="confirm-modal" class="fixed inset-0 bg-blue-900/40 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-[30px] p-6 md:p-8 max-w-sm w-full text-center shadow-2xl border-4 border-blue-200 modal-animate">
            <div id="confirm-modal-icon" class="text-5xl md:text-6xl mb-4">🤔</div>
            <h3 id="confirm-modal-title" class="text-2xl md:text-3xl font-black text-blue-600 mb-3">Are you sure?</h3>
            <p id="confirm-modal-message" class="text-lg md:text-xl text-gray-600 mb-8 font-bold leading-relaxed">Message here</p>
            <div class="flex gap-4">
                <button onclick="closeConfirmModal()" class="btn-cute flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-2xl px-4 py-3 text-xl font-black shadow-[0_6px_0_0_#d1d5db]">
                    Cancel
                </button>
                <button onclick="executeConfirm()" class="btn-cute flex-1 bg-red-400 hover:bg-red-500 text-white rounded-2xl px-4 py-3 text-xl font-black shadow-[0_6px_0_0_#e11d48]">
                    Quit
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript Logic -->
    <script>
        // 學生名單陣列
        const studentNamesList = [
            "00-Tr. Adam", "01-Ryan", "02-Ernest", "03-Jamie", "04-Owen", 
            "05-Max", "06-Leo", "07-Kaka", "08-Chandler", "09-Ashton", 
            "10-Nick", "11-Dustin", "12-Ian", "13-Jim", "14-Murphy", 
            "15-Chance", "16-Jamie", "17-Kimi", "18-Jim", "19-Yi You", 
            "20-Rylen", "21-Elva", "22-Abbie", "23-Elly", "24-Remi", 
            "25-Allison", "26-Queenie", "27-Chiao", "28-Sammi", "29-Elena", 
            "30-Jean", "31-Tammy", "32-Victoria", "33-Eeffie", "34-Melody", 
            "35-Naomi", "36-Miley", "37-Angel", "38-Minnie"
        ];

        let allAvailableUnits = []; // 儲存後端取得的所有單元
        let isUnitsLoaded = false;  // 追蹤是否已載入完畢
        let currentUnit = "";
        let currentStudentName = "";
        let questionsData = [];
        let studentAnswersArray = []; // 儲存閃卡模式下的作答
        let currentQuestionIndex = 0; // 追蹤目前題號
        let modalCallback = null;

        // === 初始化：網頁載入時渲染姓名與取得單元 ===
        window.onload = function() {
            renderNameButtons();
            
            // 呼叫 GAS 取得單元 (一次取回所有單元包含 Status)
            if(typeof google !== 'undefined' && google.script) {
                google.script.run
                    .withSuccessHandler((units) => {
                        isUnitsLoaded = true;
                        allAvailableUnits = units;
                        // 如果學生已經選好名字了，立刻幫他過濾渲染單元
                        if (currentStudentName) renderFilteredUnits(); 
                    })
                    .withFailureHandler(function(err) {
                        isUnitsLoaded = true;
                        const container = document.getElementById('units-container');
                        container.innerHTML = `<div class="col-span-full py-6 text-center text-xl font-bold text-red-500">❌ Failed to load units.<br><span class="text-sm text-gray-500">${err.message}</span></div>`;
                    })
                    .getAvailableUnits();
            } else {
                // 用於本地測試預覽 (模擬資料)
                setTimeout(() => {
                    isUnitsLoaded = true;
                    allAvailableUnits = [
                        {id: 'U2.2.2', title: 'The Solar System', status: 'Publish'}, 
                        {id: 'U2.2.1', title: 'Secret Test', status: 'Draft'}, 
                        'U2.1.3' // 相容舊字串格式
                    ];
                    if (currentStudentName) renderFilteredUnits();
                }, 1000);
            }
        };

        // === 渲染姓名按鈕 ===
        function renderNameButtons() {
            const container = document.getElementById('names-container');
            container.innerHTML = "";
            
            studentNamesList.forEach(name => {
                const btn = document.createElement('button');
                // 針對手機縮小 padding 確保一排塞得下字
                btn.className = "btn-cute bg-white hover:bg-blue-100 text-blue-800 border-2 border-blue-200 shadow-[0_4px_0_0_#bfdbfe] rounded-xl px-1 sm:px-2 py-2 sm:py-3 text-sm sm:text-base md:text-lg font-black transition-all truncate";
                btn.innerText = name;
                btn.title = name; // 滑鼠懸停可以看全名
                btn.onclick = () => selectName(name);
                container.appendChild(btn);
            });
        }

        // === 選擇姓名，進入選擇單元頁面 ===
        function selectName(name) {
            currentStudentName = name;
            
            // 更新畫面上顯示的名字
            document.getElementById('display-name-unit').innerText = currentStudentName;
            document.getElementById('display-name-quiz').innerText = currentStudentName;

            // 判斷是否已經載入單元，是的話過濾並渲染
            if (isUnitsLoaded) {
                renderFilteredUnits();
            } else {
                document.getElementById('units-container').innerHTML = `<div class="col-span-full py-6 text-center text-xl font-bold text-gray-500 animate-pulse">Loading Units ... ⏳</div>`;
            }

            // 切換區塊顯示
            document.getElementById('outer-header').classList.remove('hidden');
            document.getElementById('name-section').style.display = 'none';
            document.getElementById('unit-section').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // === 回到姓名選擇頁面 ===
        function goBackToNames() {
            document.getElementById('outer-header').classList.add('hidden');
            document.getElementById('unit-section').style.display = 'none';
            document.getElementById('name-section').style.display = 'block';
        }

        // === 回到單元選擇畫面，保留姓名 ===
        function resetToUnitSelection() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('unit-section').style.display = 'block';
            currentUnit = "";
            currentQuestionIndex = 0;
            studentAnswersArray = [];
            questionsData = [];
            window.scrollTo(0, 0);
        }

        // === 根據身分與 Status 渲染單元按鈕 ===
        function renderFilteredUnits() {
            const container = document.getElementById('units-container');
            container.innerHTML = "";

            // 過濾邏輯：如果是 Draft 且 不是 Tr. Adam，就過濾掉
            let displayUnits = allAvailableUnits.filter(unit => {
                let status = (typeof unit === 'object' && unit.status) ? unit.status.toString().toUpperCase() : 'PUBLISH';
                if (status === 'DRAFT') {
                    return currentStudentName === '00-Tr. Adam';
                }
                return true; // Publish 或是沒有填寫預設開放
            });

            // 排序邏輯：反序排列 (確保名稱最大的單元，即最新單元，排在最上面)
            displayUnits.sort((a, b) => {
                let idA = typeof a === 'object' ? a.id : a;
                let idB = typeof b === 'object' ? b.id : b;
                return String(idB).localeCompare(String(idA));
            });

            if (!displayUnits || displayUnits.length === 0) {
                container.innerHTML = `<div class="col-span-full py-6 text-center text-xl font-bold text-orange-500">📭 No quizzes available yet.</div>`;
                return;
            }

            displayUnits.forEach(unit => {
                let unitId = typeof unit === 'object' ? unit.id : unit;
                let unitTitle = typeof unit === 'object' ? unit.title : "";
                let displayText = unitTitle ? `${unitId} - ${unitTitle}` : unitId;
                
                // Tr. Adam 看到草稿單元時，給個小標示提醒
                let status = (typeof unit === 'object' && unit.status) ? unit.status.toString().toUpperCase() : '';
                if (status === 'DRAFT') {
                    displayText += " 📝(Draft)";
                }

                const btn = document.createElement('button');
                // 空心按鈕風格：白底、水藍邊框、深藍文字
                btn.className = "btn-cute w-full text-left whitespace-normal bg-white border-4 border-cyan-400 hover:bg-cyan-50 text-cyan-900 shadow-[0_6px_0_0_#22d3ee] rounded-2xl px-4 md:px-6 py-3 md:py-4 text-lg md:text-2xl font-black transition-all";
                
                // Tr. Adam 看到草稿單元時，給個明顯的橘色標籤提醒
                if (status === 'DRAFT') {
                    btn.innerHTML = `<span>${displayText}</span> <span class="inline-block mt-1 md:mt-0 ml-0 md:ml-2 bg-orange-100 text-orange-600 border-2 border-orange-300 text-sm px-2 py-0.5 rounded-lg align-middle shadow-sm">📝 Draft</span>`;
                } else {
                btn.innerText = displayText;
                }

                btn.onclick = () => startQuiz(unitId, btn); 
                container.appendChild(btn);
            });
        }

        // === 客製化彈出視窗控制 ===
        function showModal(msg, icon = '🐻', title = 'Oops!', callback = null) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('custom-modal').classList.remove('hidden');
            modalCallback = callback;
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
            if (modalCallback) {
                modalCallback();
                modalCallback = null;
            }
        }

        // === 1. Start Quiz ===
        function startQuiz(unitName, clickedBtn) {
            currentUnit = unitName;
            document.getElementById('quiz-title').innerText = currentUnit; 

            // 改變按鈕狀態顯示載入中 (使用 innerHTML 暫存，避免覆蓋標籤樣式)
            const originalHTML = clickedBtn.innerHTML;
            clickedBtn.innerHTML = "Loading... ⏳";
            clickedBtn.disabled = true;

            // 呼叫 GAS 後端取得題目
            if(typeof google !== 'undefined' && google.script) {
            google.script.run
                    .withSuccessHandler((data) => {
                        clickedBtn.innerHTML = originalHTML;
                        clickedBtn.disabled = false;
                        renderQuiz(data);
                    })
                .withFailureHandler(function(err) {
                    showModal('Error: ' + err.message, '🔧', 'System Error');
                        clickedBtn.innerHTML = originalHTML;
                        clickedBtn.disabled = false;
                })
              .getQuestions(currentUnit);
            } else {
                // 本地預覽測試用
                setTimeout(() => {
                    clickedBtn.innerHTML = originalHTML;
                    clickedBtn.disabled = false;
                    renderQuiz([
                        {type: "MCQ", question: "This is Q1. Which option is correct?", options: ["Option A (Very Long Text Check)", "Option B", "Option C", "Option D"]},
                        {type: "Fill", question: "Type 'apple' in the blank."}
                    ]);
                }, 800);
            }
        }

        // === 2. Render Questions (FreshCard)===
        function renderQuiz(data) {
            if (!data || data.length === 0) {
                showModal(
                    `We couldn't find questions for "${currentUnit}".`, 
                    '🔍', 
                    'No Questions Found',
                    () => { resetToUnitSelection(); }
                );
                return;
            }

            questionsData = data;
            // 初始化答案陣列長度與題目相同
            studentAnswersArray = new Array(data.length).fill("");
            currentQuestionIndex = 0;

            document.getElementById('unit-section').style.display = 'none';
            document.getElementById('quiz-section').style.display = 'block';
            
            showFlashcard(currentQuestionIndex);
        }

        function showFlashcard(index) {
            const container = document.getElementById('questions-container');
            const q = questionsData[index];
                const qNum = index + 1;
            const totalQs = questionsData.length;

            // 重新觸發動畫效果
            container.classList.remove('flashcard-animate');
            void container.offsetWidth; // 觸發重繪
            container.classList.add('flashcard-animate');

                let qHTML = `
            <div class="bg-blue-50/50 rounded-3xl p-5 md:p-8 border-4 border-blue-100 shadow-sm relative overflow-hidden min-h-[250px] flex flex-col justify-center">
                <div class="absolute top-0 left-0 bg-blue-500 text-white font-black text-sm md:text-lg px-4 py-2 rounded-br-2xl shadow-sm">
                    Q${qNum} / ${totalQs}
                </div>
                <p class="text-xl md:text-3xl font-bold text-gray-800 mt-8 mb-6 leading-relaxed text-center">${q.question}</p>
                `;

                if (q.type === 'MCQ') {
                qHTML += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4 w-full">`;
                    q.options.forEach((opt, optIndex) => {
                        const optId = `q${index}_opt${optIndex}`;
                    const isChecked = studentAnswersArray[index] === opt ? "checked" : "";
                        qHTML += `
                    <div class="relative w-full">
                        <input type="radio" name="ans_${index}" id="${optId}" value="${opt}" class="option-input peer sr-only" ${isChecked}>
                        <!-- 確保選項文字完整顯示，不使用 truncate -->
                        <label for="${optId}" class="option-label flex items-center justify-center w-full min-h-[60px] text-lg md:text-2xl font-bold text-gray-700 bg-white border-4 border-blue-100 rounded-2xl p-3 cursor-pointer hover:bg-blue-50 text-center leading-tight">
                                ${opt}
                            </label>
                        </div>`;
                    });
                    qHTML += `</div>`;
                } else if (q.type === 'Fill') {
                const currentVal = studentAnswersArray[index] || "";
                    qHTML += `
                    <div class="mt-4 text-center">
                    <input type="text" id="ans_${index}" value="${currentVal}" placeholder="Type here..." autocomplete="off"
                        class="fill-input w-full sm:w-2/3 text-xl md:text-3xl font-bold px-4 py-3 md:py-4 bg-white border-2 border-transparent border-b-blue-200 text-center text-blue-600 focus:border-b-blue-500 rounded-t-xl transition-all">
                    </div>`;
                }

                qHTML += `</div>`;
            container.innerHTML = qHTML;

            // 更新按鈕顯示狀態
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const submitBtn = document.getElementById('submitBtn');

            if (index === 0) {
                prevBtn.classList.add('hidden');
            } else {
                prevBtn.classList.remove('hidden');
            }

            if (index === questionsData.length - 1) {
                nextBtn.classList.add('hidden');
                submitBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                submitBtn.classList.add('hidden');
            }

            window.scrollTo(0, 0);
        }

        // 儲存當前題目的答案
        function saveCurrentAnswer() {
            const q = questionsData[currentQuestionIndex];
                let ans = "";
                if (q.type === 'MCQ') {
                const selected = document.querySelector(`input[name="ans_${currentQuestionIndex}"]:checked`);
                    if (selected) ans = selected.value;
                } else if (q.type === 'Fill') {
                const inputEl = document.getElementById(`ans_${currentQuestionIndex}`);
                if (inputEl) ans = inputEl.value.trim();
                }
            studentAnswersArray[currentQuestionIndex] = ans;
        }

        function nextQuestion() {
            saveCurrentAnswer();
            if (!studentAnswersArray[currentQuestionIndex]) {
                showModal("Please answer this question first!", "🦊", "Wait!");
                return;
            }
            if (currentQuestionIndex < questionsData.length - 1) {
                currentQuestionIndex++;
                showFlashcard(currentQuestionIndex);
            }
        }

        function prevQuestion() {
            saveCurrentAnswer();
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showFlashcard(currentQuestionIndex);
            }
        }

        function submitQuiz() {
            saveCurrentAnswer();

            // 檢查是否每一題都有作答
            const isAllAnswered = studentAnswersArray.every(ans => ans.trim() !== "");
            if (!isAllAnswered) {
                showModal("You haven't answered questions! Please check again.", "🦊", "Wait!");
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Grading... 📝";
            submitBtn.disabled = true;

            const payload = {
                name: currentStudentName,
                unit: currentUnit,
                answers: studentAnswersArray
            };

            // 呼叫 GAS 後端傳送答案並批改
            if(typeof google !== 'undefined' && google.script) {
            google.script.run
              .withSuccessHandler(showResults)
                .withFailureHandler(function(err) {
                    showModal('Error: ' + err.message, '🔧', 'System Error');
                    submitBtn.innerText = "🙌 I'm done! Submit";
                    submitBtn.disabled = false;
                })
              .submitAnswers(payload);
            } else {
                 // 本地測試模擬成績
                setTimeout(() => {
                    showResults({
                        score: 85,
                        details: [
                            {question: "This is a local test question 1.", correct: true, studentAns: "A", correctAns: "A"},
                            {question: "Type 'apple' in the blank.", correct: false, studentAns: "Wrong", correctAns: "apple"}
                        ],
                        leaderboard: [{name: currentStudentName, score: 85}, {name: "01-Ryan", score: 80}]
                    });
                }, 1000);
            }
        }

        // === 4. Show Results & Leaderboard ===
        function showResults(resultData) {
            // Switch view
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            window.scrollTo(0, 0);

            // 恢復 Submit 按鈕狀態以防重玩
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "🙌 I'm done! Submit";
            submitBtn.disabled = false;

            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.6 },
                colors: ['#3b82f6', '#06b6d4', '#6366f1', '#93c5fd']
            });

            // Score Animation
            animateScore(resultData.score);

            // 1. & 2. 設定評語與正確題數
            const totalQs = resultData.details.length;
            const correctQs = resultData.details.filter(d => d.correct).length;
            document.getElementById('correct-count').innerText = `✅ Correct: ${correctQs} / ${totalQs}`;

            const feedbackMsg = document.getElementById('feedback-msg');
            const feedbackEmoji = document.getElementById('feedback-emoji');
            const retryBtn = document.getElementById('retry-btn');
            
            if (resultData.score === 100) {
                feedbackMsg.innerText = "Perfect! Amazing! 🎉";
                feedbackEmoji.innerText = "🌟🏆🌟";
                retryBtn.innerText = "🔄 Play Again";
            } else if (resultData.score >= 80) {
                feedbackMsg.innerText = "Great Job! 👏";
                feedbackEmoji.innerText = "🏆";
                retryBtn.innerText = "🔄 Try Again";
            } else if (resultData.score >= 60) {
                feedbackMsg.innerText = "Good Effort! 👍";
                feedbackEmoji.innerText = "✨";
                retryBtn.innerText = "🔄 Try Again";
            } else {
                feedbackMsg.innerText = "Keep Trying! 💪";
                feedbackEmoji.innerText = "🦊";
                feedbackMsg.classList.replace('text-blue-600', 'text-orange-500'); 
                retryBtn.innerText = "🔄 Try Again";
            }

            // Review Container
            const reviewContainer = document.getElementById('review-container');
            
            // 先加上題號，再依照正確與否排序 (false 放前面)
            const sortedDetails = resultData.details
                .map((item, idx) => ({ ...item, qNum: idx + 1 }))
                .sort((a, b) => (a.correct === b.correct) ? 0 : a.correct ? 1 : -1);

            // 優化：先組好所有 HTML 再一次渲染
            const reviewHTML = sortedDetails.map((item) => {
                const isCorrect = item.correct;
                const icon = isCorrect ? "✅" : "❌";
                const colorClass = isCorrect ? "text-green-500" : "text-red-500";
                const bgHighlight = isCorrect ? "" : "bg-red-50 -mx-2 px-2 rounded-xl"; 
                
                let itemHTML = `
                <div class="mb-3 border-b border-blue-50 pb-2 ${bgHighlight}">
                    <p class="text-gray-800 text-base md:text-lg">Q${item.qNum}: ${item.question}</p>
                    <p class="${colorClass} text-lg md:text-xl mt-1">
                        ${icon} Your Answer: <span class="font-black">${item.studentAns || '(No answer)'}</span>
                    </p>`;
                
                // 對於答錯的題目，顯示正確答案
                if (!isCorrect) {
                    itemHTML += `<p class="text-green-600 text-base md:text-lg mt-1">
                        💡 Correct Answer: <span class="font-black">${item.correctAns}</span>
                    </p>`;
                }
                
                itemHTML += `</div>`;
                return itemHTML;
            }).join('');

            reviewContainer.innerHTML = reviewHTML;

            // 4. 顯示排行榜
            const lbContainer = document.getElementById('leaderboard');
            lbContainer.innerHTML = "";
            resultData.leaderboard.forEach((user, idx) => {
                let medal = idx === 0 ? "🥇" : idx === 1 ? "🥈" : idx === 2 ? "🥉" : "✨";
                // Highlight current user
                let bgClass = user.name === currentStudentName ? "bg-indigo-100 border-2 border-indigo-300 rounded-xl px-2 -mx-2" : "";
                
                lbContainer.innerHTML += `
                <li class="flex justify-between items-center ${bgClass} py-1 px-2 md:px-4">
                    <span class="truncate pr-2">${medal} ${user.name}</span>
                    <span class="font-black text-xl md:text-2xl text-indigo-600">${user.score}</span>
                </li>`;
            });
        }

        // Score Counter Animation
        function animateScore(targetScore) {
            let current = 0;
            const scoreElement = document.getElementById('final-score');
            const interval = setInterval(() => {
                current += 2;
                if (current >= targetScore) {
                    current = targetScore;
                    clearInterval(interval);
                }
                scoreElement.innerText = current;
            }, 20);
        }

        // === 鍵盤事件監聽：按 Enter 跳下一題 ===
        document.addEventListener('keydown', function(event) {
            if (event.key !== 'Enter') return;

            // 如果提示 Modal 是開啟的，按 Enter 等同於按 OK
            const modal = document.getElementById('custom-modal');
            if (!modal.classList.contains('hidden')) {
                event.preventDefault();
                closeModal();
                return;
            }

            // 如果確認 Modal 是開啟的，不做任何事
            const confirmModal = document.getElementById('confirm-modal');
            if (!confirmModal.classList.contains('hidden')) {
                return;
            }

            // 檢查是否在測驗畫面中
            const quizSection = document.getElementById('quiz-section');
            if (quizSection.style.display === 'block') {
                event.preventDefault(); // 防止在填空題中按 Enter 觸發預設行為

                const submitBtn = document.getElementById('submitBtn');
                // 如果提交按鈕是可見的，代表是最後一題
                if (!submitBtn.classList.contains('hidden')) {
                    submitQuiz();
                } else {
                    nextQuestion();
                }
            }
        });
    </script>
</body>
</html>
